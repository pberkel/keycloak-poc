apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: keycloak-poc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: keycloak-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.26.1
          ports:
            - containerPort: 3000
          env:
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__server__DOMAIN
              value: gitea-poc.pjberkel.com
            - name: GITEA__server__ROOT_URL
              value: https://gitea-poc.pjberkel.com/
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__server__DISABLE_SSH
              value: "true"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: keycloak-poc
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
